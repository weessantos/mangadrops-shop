name: Update Prices and Deploy

on:
  schedule:
    - cron: "0 */8 * * *" # roda a cada 8 horas
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # restaura login do Mercado Livre
      - name: Restore ML session
        run: |
          cat > ml-session.json <<'EOF'
          ${{ secrets.ML_SESSION }}
          EOF

      # roda o scraper
      - name: Update prices
        run: npm run update-prices

      # build do site
      - name: Build site
        run: npm run build

      # publica no gh-pages
      - name: Deploy site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist