name: Update Prices and Deploy

on:
  schedule:
    # roda a cada 8 horas
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore ML session
        run: |
          echo "${{ secrets.ML_SESSION }}" | base64 -d > ml-session.json

      - name: Run price update
        run: npm run update-prices

      - name: Commit updated prices
        run: |
          git config --global user.name "price-bot"
          git config --global user.email "bot@mangadrops"
          git add src/data/prices.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update prices"
          git push

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist