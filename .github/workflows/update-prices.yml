name: Update Prices

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run price script
        run: npm run update-prices

      - name: Commit prices
        run: |
          git config --global user.name "price-bot"
          git config --global user.email "bot@mangadrops"
          git add src/data/prices.json
          git diff --cached --quiet && exit 0
          git commit -m "update prices"
          git push