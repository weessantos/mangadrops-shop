<!doctype html>
<html lang="pt-br">
  <head>
    <!-- ======================================== -->
    <!-- META -->
    <!-- ======================================== -->

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CMS Mangá Drops</title>

    <!-- ======================================== -->
    <!-- GOOGLE FONT -->
    <!-- ======================================== -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ======================================== -->
    <!-- SUPABASE -->
    <!-- ======================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ======================================== -->
    <!-- CSS -->
    <!-- ======================================== -->

    <link rel="stylesheet" href="/admin/index.css" />
  </head>

  <body>
    <!-- ===================================================== -->
    <!-- APP -->
    <!-- ===================================================== -->

    <div class="app-layout">
      <!-- ================================================= -->
      <!-- SIDEBAR -->
      <!-- ================================================= -->

      <aside class="sidebar">
        <!-- LOGO -->
        <div class="sidebar-header">
          <img src="/assets/logo.png" alt="Mangá Drops" class="sidebar-logo" />
        </div>

        <!-- AÇÕES -->
        <div class="sidebar-actions">
          <button class="btn btn-primary btn-full" onclick="openSeriesModal()">
            ➕ Nova Série
          </button>

          <button class="btn btn-warning btn-full" onclick="updateAllPrices()">
            🔥 Atualizar Preços
          </button>
        </div>

        <!-- DIVISOR -->
        <div class="sidebar-divider"></div>

        <!-- TÍTULO -->
        <div class="sidebar-section-header">
          <span class="sidebar-label"> Biblioteca </span>

          <span class="sidebar-count" id="series-count"> -- </span>
        </div>

        <!-- LISTA -->
        <div id="series-list" class="series-list"></div>
      </aside>

      <!-- ================================================= -->
      <!-- MAIN -->
      <!-- ================================================= -->

      <main class="main-content">
        <div class="content-wrapper">
          <!-- ======================================== -->
          <!-- HEADER -->
          <!-- ======================================== -->

          <header class="main-header">
            <div class="header-left">
              <span class="page-kicker"> CMS / Painel Administrativo </span>

              <h1 id="series-title">Mangá Drops CMS</h1>
            </div>

            <div class="header-actions">
              <button class="btn btn-secondary" onclick="logout()">Sair</button>
            </div>
          </header>

          <!-- ======================================== -->
          <!-- CONTAINER DOS VOLUMES -->
          <!-- ======================================== -->

          <div class="series-page">
            <!-- HEADER DA SÉRIE -->
            <div id="series-header"></div>

            <!-- TOOLBAR -->
            <div id="series-toolbar" class="toolbar">
              <!-- CRIAÇÃO -->
              <div class="toolbar-group">
                <button id="btn-new-volume" class="btn btn-primary">
                  + Novo Volume
                </button>

                <button id="btn-generate" class="btn btn-secondary">
                  ⚡ Gerar Faltantes
                </button>

                <button id="btn-bulk-desc" class="btn btn-secondary">
                  ✨ Descrições
                </button>
              </div>

              <button id="btn-normalize-links" class="btn btn-secondary">
                🔗 Normalizar Links
              </button>

              <!-- EDIÇÃO -->
              <div class="toolbar-group">
                <button id="btn-edit-series" class="btn btn-primary">
                  ✏️ Editar Série
                </button>

                <button id="btn-related" class="btn btn-secondary">
                  📚 Relacionados
                </button>
              </div>

              <!-- AÇÕES -->
              <div class="toolbar-group">
                <button id="btn-save-all" class="btn btn-success">
                  💾 Salvar Tudo
                </button>

                <button id="btn-delete-series" class="btn btn-danger">
                  🗑 Excluir Série
                </button>
              </div>
            </div>

            <!-- LISTA DE VOLUMES -->
            <section id="volumes"></section>
            <div id="save-bar" class="save-bar">
              <div class="save-bar-left">
                <div class="stat-pill">
                  <span class="stat-label">Volumes</span>
                  <span id="total-volumes">0</span>
                </div>

                <div class="stat-pill warning">
                  <span class="stat-label">Alterações</span>
                  <span id="pending-changes">0</span>
                </div>
              </div>

              <div class="save-bar-right">
                <button
                  id="save-all-bottom"
                  class="btn btn-primary"
                  onclick="saveAllVolumes()"
                >
                  💾 Salvar Tudo
                </button>
              </div>
            </div>
            <div id="volume-nav"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- ===================================================== -->
    <!-- MODAL -->
    <!-- ===================================================== -->

    <!-- IMPORTANTE -->
    <!-- admin.js usa #modal -->
    <div class="modal" id="modal">
      <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- ===================================================== -->
    <!-- LOADING -->
    <!-- ===================================================== -->

    <!-- IMPORTANTE -->
    <!-- admin.js usa #loading-overlay -->
    <div id="loading-overlay">
      <div class="loader-box">
        <div class="spinner"></div>

        <span id="loading-text"> Carregando... </span>
      </div>
    </div>

    <!-- ===================================================== -->
    <!-- TOAST -->
    <!-- ===================================================== -->

    <!-- IMPORTANTE -->
    <!-- admin.js usa #toast-overlay -->
    <div id="toast-overlay">
      <div class="toast-box">
        <span id="toast-message"> Mensagem </span>
      </div>
    </div>

    <!-- ===================================================== -->
    <!-- MODAL DE PROGRESSO -->
    <!-- ===================================================== -->

    <!-- IMPORTANTE -->
    <!-- admin.js usa TODOS os IDs daqui -->
    <div id="progress-modal" class="progress-overlay">
      <div class="progress-container">
        <!-- HEADER -->
        <div class="progress-header">
          <div>
            <h2>🔥 Atualizando preços</h2>

            <p>Aguarde enquanto os preços são sincronizados.</p>
          </div>

          <button class="btn btn-danger" onclick="cancelPriceUpdate()">
            🛑 Cancelar
          </button>
        </div>

        <!-- GRID -->
        <div class="progress-grid">
          <!-- ======================================== -->
          <!-- AMAZON -->
          <!-- ======================================== -->

          <div class="progress-card amazon-card">
            <div class="progress-card-header">
              <span> 🟦 Amazon </span>

              <span id="amazon-progress-text"> 0 / 0 </span>
            </div>

            <div class="progress-track">
              <div
                id="amazon-progress-bar"
                class="progress-fill amazon-fill"
              ></div>
            </div>

            <div id="amazon-logs" class="progress-logs"></div>
          </div>

          <!-- ======================================== -->
          <!-- MERCADO LIVRE -->
          <!-- ======================================== -->

          <div class="progress-card ml-card">
            <div class="progress-card-header">
              <span> 🟨 Mercado Livre </span>

              <span id="ml-progress-text"> 0 / 0 </span>
            </div>

            <div class="progress-track">
              <div id="ml-progress-bar" class="progress-fill ml-fill"></div>
            </div>

            <div id="ml-logs" class="progress-logs"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================================================== -->
    <!-- ADMIN JS -->
    <!-- ===================================================== -->

    <script src="/admin/admin.js?v=3"></script>
  </body>
</html>
