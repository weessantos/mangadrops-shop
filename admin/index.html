<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CMS Mangá</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --border: #1f2937;
  --accent: #6366f1;
  --text: #e5e7eb;
  --muted: #9ca3af;
}

body {
  margin: 0;
  font-family: Inter;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  border-right: 1px solid var(--border);
  padding: 20px;
}

.series-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.series-item:hover {
  background: var(--card);
}

.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  margin-top: 5px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #020617;
  color: white;
}

button {
  background: var(--accent);
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Séries</h3>
  <button onclick="openSeriesModal()">+ Nova</button>
  <div id="series-list"></div>
</div>

<div class="main">
  <div class="topbar">
    <h2 id="title">Selecione uma série</h2>
    <button id="new-volume" style="display:none">+ Volume</button>
  </div>
  <div id="volumes"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modal-content"></div>
</div>

<!-- ✅ AGORA CORRETO -->
<script src="admin.js"></script>

</body>
</html>
