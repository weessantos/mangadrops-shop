<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CMS Mangá</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b1120;
  --card: #111827;
  --card-2: #0f172a;
  --border: #1f2937;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --danger: #ef4444;

  --text: #e5e7eb;
  --muted: #9ca3af;
}

/* RESET */
* {
  box-sizing: border-box;
}

/* BODY */
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  border-right: 1px solid var(--border);
  padding: 20px;
  background: #020617;
}

.sidebar h3 {
  margin-top: 0;
  margin-bottom: 15px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 15px;
  font-weight: 600;
}

.series-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  transition: 0.2s;
}

.series-item:hover {
  background: var(--card);
  color: var(--text);
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.topbar h2 {
  margin: 0;
  font-size: 22px;
}

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 15px;
  transition: 0.2s;
}

.card:hover {
  border-color: var(--accent);
}

/* INPUTS */
input, textarea {
  width: 100%;
  margin-top: 5px;
  margin-bottom: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #020617;
  color: white;
  transition: 0.2s;
}

input:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* BOTÕES */
button {
  background: var(--accent);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  font-weight: 500;
  transition: 0.2s;
}

button:hover {
  background: var(--accent-hover);
}

/* BOTÕES ESPECIAIS */
button.danger {
  background: var(--danger);
}

button.secondary {
  background: var(--card-2);
  border: 1px solid var(--border);
}

button.secondary:hover {
  background: var(--card);
}

/* AÇÕES (botões de topo da série) */
.actions {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* SCROLL BONITO */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111827;
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.3s;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<div class="sidebar">
  <h3>Séries</h3>
  <button onclick="openSeriesModal()">+ Nova Série</button>
  <div id="series-list"></div>
</div>

<div class="main">
  <div class="topbar">
    <h2 id="title">Selecione uma série</h2>
    <button id="new-volume" style="display:none">+ Volume</button>
  </div>
  <div id="volumes"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modal-content"></div>
</div>

<!-- ✅ AGORA CORRETO -->
<script src="/admin/admin.js?v=2"></script>

<div id="toast" class="toast"></div>

</body>
</html>
