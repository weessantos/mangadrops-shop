<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ SEO básico -->
    <title>Mangá Drops</title>
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mangasdrops.online" />

    <!-- ✅ Open Graph (preview de link) -->
    <meta property="og:title" content="Mangá Drops" />
    <meta
      property="og:description"
      content="Acompanhe lançamentos, promoções e organize sua coleção de mangás no Mangá Drops."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mangasdrops.online" />
    <meta
      property="og:image"
      content="https://mangasdrops.online/preview.png"
    />

    <!-- ✅ Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mangá Drops" />
    <meta
      name="twitter:description"
      content="Acompanhe lançamentos, promoções e organize sua coleção de mangás."
    />
    <meta
      name="twitter:image"
      content="https://mangasdrops.online/preview.png"
    />

    <!-- ✅ Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Mangá Drops",
        "url": "https://mangasdrops.online",
        "sameAs": [
          "https://www.instagram.com/_mangadrops",
          "https://www.tiktok.com/@_mangadrops"
        ]
      }
    </script>

    <!-- ✅ GitHub Pages SPA fallback (NÃO MEXER) -->
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const p = params.get("__gh_path__");
        if (p) {
          params.delete("__gh_path__");
          const clean = params.toString();
          history.replaceState(null, "", p + (clean ? "?" + clean : ""));
        }
      })();
    </script>

    <!-- ✅ Google Analytics (apenas 1 script externo) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-C5VWWDR3S2"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-C5VWWDR3S2");
    </script>
  </head>
